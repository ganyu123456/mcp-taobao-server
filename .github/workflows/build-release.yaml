name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.0.0)"
        required: true
        default: "1.0.0"

env:
  REGISTRY: harbor.zkjgy.online
  PROJECT: library
  IMAGE_NAME: mcp-taobao-server

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
    steps:
      - id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
            echo "version=$V" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

  build-amd64:
    name: Build amd64
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-amd64

      - name: Save image for offline release
        if: needs.version.outputs.is_tag == 'true'
        run: |
          docker pull --platform linux/amd64 \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-amd64
          docker save \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-amd64 \
            | gzip > ${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}_linux-amd64.tar.gz

      - name: Upload amd64 artifact
        if: needs.version.outputs.is_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: image-amd64
          path: ${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}_linux-amd64.tar.gz
          retention-days: 1

  build-arm64:
    name: Build arm64
    needs: version
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-arm64

      - name: Save image for offline release
        if: needs.version.outputs.is_tag == 'true'
        run: |
          docker pull --platform linux/arm64 \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-arm64
          docker save \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-arm64 \
            | gzip > ${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}_linux-arm64.tar.gz

      - name: Upload arm64 artifact
        if: needs.version.outputs.is_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: image-arm64
          path: ${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}_linux-arm64.tar.gz
          retention-days: 1

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs:
      - version
      - build-amd64
      - build-arm64
    steps:
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Create and push manifests
        run: |
          V="${{ needs.version.outputs.version }}"
          BASE="${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}"

          docker buildx imagetools create \
            --tag "${BASE}:${V}" \
            "${BASE}:${V}-amd64" \
            "${BASE}:${V}-arm64"

          docker buildx imagetools create \
            --tag "${BASE}:latest" \
            "${BASE}:${V}-amd64" \
            "${BASE}:${V}-arm64"

          echo "Manifest ${BASE}:${V} and ${BASE}:latest created"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - build-amd64
      - build-arm64
      - manifest
    if: needs.version.outputs.is_tag == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 image
        uses: actions/download-artifact@v4
        with:
          name: image-amd64
          path: release

      - name: Download arm64 image
        uses: actions/download-artifact@v4
        with:
          name: image-arm64
          path: release

      - name: Prepare release files
        run: |
          V="${{ needs.version.outputs.version }}"
          PKG="${{ env.IMAGE_NAME }}_v${V}"

          mkdir -p "$PKG"
          cp docker-compose.yaml "$PKG/"
          cp .env.example "$PKG/.env"

          # 将发布包 .env 中的 MCP_IMAGE 取消注释并锁定到本次发布版本
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${V}"
          sed -i "s|^# MCP_IMAGE=harbor.*|MCP_IMAGE=${IMAGE}|" "$PKG/.env"

          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('v{0}', needs.version.outputs.version) }}
          name: "MCP Taobao Server v${{ needs.version.outputs.version }}"
          generate_release_notes: true
          body: |
            ## MCP Taobao Server v${{ needs.version.outputs.version }}

            为大模型提供**淘宝闪购/饿了么外卖**能力的 MCP Server：搜附近店、看菜单、加入购物车、
            生成待支付订单（走到确认订单/支付页即停，**登录与付款由人工经 noVNC 完成**）。
            服务器无物理屏幕时用 Xvfb 虚拟有头运行 Chromium。

            ### 文件说明

            | 文件 | 说明 |
            |------|------|
            | `${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}/` | 运行包（docker-compose + 配置） |
            | `${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}_linux-amd64.tar.gz` | x86_64 镜像 |
            | `${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}_linux-arm64.tar.gz` | ARM64 镜像 |

            ### 离线部署

            ```bash
            docker load -i ${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}_linux-amd64.tar.gz
            cd ${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}
            docker compose up -d
            ```

            ### 在线部署（从 Harbor 拉取）

            ```bash
            docker login ${{ env.REGISTRY }}
            docker pull ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
            ```

            编辑 `.env` 中 `MCP_IMAGE` 指向 Harbor 地址，然后 `docker compose up -d`。

            ### 使用流程

            1. `shangou_open_login` → 浏览器打开 `http://<your-server>:6080/vnc.html`（noVNC），手机+短信+滑块登录
            2. `shangou_list_addresses` / `shangou_set_address` 选收货地址
            3. `shangou_search` 搜店 → `shangou_shop_menu` → `shangou_add_to_cart` 加购
            4. `shangou_create_order` → 停在支付页，返回金额与截图
            5. 回到 noVNC 手动确认并付款

            ### MCP 客户端配置

            ```json
            {
              "mcpServers": {
                "shangou": {
                  "url": "http://<your-server>:8094/sse"
                }
              }
            }
            ```

            ### 校验
            ```bash
            sha256sum -c checksums.txt
            ```

          files: |
            release/*
            ${{ env.IMAGE_NAME }}_v${{ needs.version.outputs.version }}/*
